          <p class="listing-hero__lede" data-i18n="listLede">
            这里放的是更轻的记录。一行判断、一小段想法，或者还没长成文章的念头。
          </p>

            <p class="note-entry__body" data-i18n="note1">
              博客首页不该像产品落地页，目录感比 CTA 更重要。
            </p>
          </article>
          <article class="note-entry">
            <time class="note-entry__date" datetime="2026-03-30">03.30</time>
            <p class="note-entry__body" data-i18n="note2">
              正文宽度宁可偏窄，也不要让技术文章变成横向扫描任务。
            </p>
          </article>
          <article class="note-entry">
            <time class="note-entry__date" datetime="2026-03-28">03.28</time>
            <p class="note-entry__body" data-i18n="note3">
              好的归档页不是“旧文章列表”，而是你的长期思考地图。
            </p>
          </article>
          <article class="note-entry">
            <time class="note-entry__date" datetime="2026-03-21">03.21</time>
            <p class="note-entry__body" data-i18n="note4">
              如果一篇文章必须依赖夸张的标题才能被点开，多半说明正文本身还没准备好。
            </p>
          </article>
          <article class="note-entry">
            <time class="note-entry__date" datetime="2026-03-17">03.17</time>
            <p class="note-entry__body" data-i18n="note5">
              工具链越复杂，就越应该写下那些“本来以为理所当然”的前提条件。
            </p>
